<!DOCTYPE html>
<html>
<head>
  <title>Satish Kumar Links</title> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>

#animationScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
}

.crack{
font-size:90px;
animation:pulse 1s infinite;
text-shadow:0 0 25px yellow;
}

.text{
text-align:center;
animation:zoomIn 1s ease;
}

.text h2{
font-size:38px;
color:#ffd700;
margin:10px 0;
}

.text p{
font-size:18px;
color:white;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

@keyframes zoomIn{
from{
opacity:0;
transform:scale(0.7);
}
to{
opacity:1;
transform:scale(1);
}
}
    body{
      margin:0;
      font-family:Arial;
      background:#000;
      color:white;
      text-align:center;
      padding:30px;
    }

    .profile{
      width:140px;
      height:140px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #FFD700;
      margin-top:20px;
    }

    h1{
      margin-top:20px;
      font-size 60px;
    }

    p{
      color:#bbb;
    }

.btn{
display:block;
background:linear-gradient(135deg,#A67C00,#FFD700);
color:black;
font-size 24px;
font-weight 700;
padding:15px;
margin:15px auto;
width:90%;
max-width:400px;
border-radius:15px;
text-decoration:none;
font-weight:bold;
border:2px solid #FFD700;
box-shadow:0 0 12px rgba(255,215,0,0.4);
transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
background:#FFD700;
color:black;
box-shadow:0 0 25px #FFD700;
}

    .card{
      background:#111;
      padding:20px;
      border-radius:20px;
      margin-top:20px;
    }
  #welcome{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  font-weight:bold;
  z-index:9999;
  animation:fadeOut 3s forwards;
}

@keyframes fadeOut{
  0%{
    opacity:1;
  }

  80%{
    opacity:1;
  }

  100%{
    opacity:0;
    visibility:hidden;
  }
}
</style>
</head>
<script>

document.getElementById("animationScreen").style.display = "flex";

setTimeout(function(){

}

</script>
